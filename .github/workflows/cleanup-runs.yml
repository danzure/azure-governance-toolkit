name: Cleanup old workflow runs
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Run at midnight every Sunday

jobs:
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3
